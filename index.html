<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Foundry Chat</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 800px;
      height: 90vh;
      background: #111827;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #374151;
    }

    header {
      padding: 20px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 15px;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #1e293b;
    }

    footer {
      padding: 20px;
      border-top: 1px solid #374151;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      outline: none;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #3b82f6;
    }
  </style>
</head>

<body>

  <div class="container">

    <header>
      <h1>🤖 AI Foundry Chat</h1>
    </header>

    <div id="chat"></div>

    <footer>

      <input type="text" id="message" placeholder="Digite sua mensagem...">

      <button onclick="sendMessage()">
        Enviar
      </button>

    </footer>

  </div>

  <script>

    const workerUrl = "https://juliana-foundry-chat.juliana-v-silva14.workers.dev";

    async function sendMessage() {

      const input = document.getElementById("message");

      const chat = document.getElementById("chat");

      const text = input.value.trim();

      if (!text) return;

      addMessage(text, "user");

      input.value = "";

      try {

        const response = await fetch(workerUrl, {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            messages: [
              {
                role: "user",
                content: text
              }
            ]
          })

        });

        const data = await response.json();

        console.log(data);

        let resposta =
          data.output_text ||
          data.output?.[0]?.content?.[0]?.text ||
          data.output?.[1]?.content?.[0]?.text ||
          data.error?.message ||
          data.error ||
          JSON.stringify(data);
        if (data.output_text) {
          resposta = data.output_text;
        }

        else if (data.output) {

          data.output.forEach(item => {

            if (item.type === "message") {

              item.content.forEach(content => {

                if (content.type === "output_text") {
                  resposta = content.text;
                }

              });

            }

          });

        }

        addMessage(resposta, "bot");

      }

      catch (error) {

        console.log(error);

        addMessage("Erro: " + error.message, "bot");

      }

    }

    function addMessage(text, type) {

      const chat = document.getElementById("chat");

      const div = document.createElement("div");

      div.classList.add("message");
      div.classList.add(type);

      div.innerHTML = text.replace(/\n/g, "<br>");

      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;

    }

    document.getElementById("message")
      .addEventListener("keydown", function (e) {

        if (e.key === "Enter") {
          sendMessage();
        }

      });

  </script>

</body>

</html>
